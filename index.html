<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 LED Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #070b10;
    --panel:    #0d1520;
    --border:   #1a2d45;
    --glow-off: #1a2d45;
    --glow-on:  #00e5ff;
    --on:       #00e5ff;
    --on-dim:   rgba(0,229,255,0.12);
    --on-mid:   rgba(0,229,255,0.35);
    --off:      #1e3a4a;
    --text:     #c8dde8;
    --muted:    #3a5568;
    --white:    #ffffff;
    --danger:   #ff4757;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* ── ANIMATED GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCAN LINE ── */
  body::after {
    content: '';
    position: fixed;
    top: -100%;
    left: 0; right: 0;
    height: 40%;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(0,229,255,0.015),
      transparent
    );
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes scan { to { top: 160%; } }

  /* ── LAYOUT ── */
  .shell {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 1.5rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  .header-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--on);
    opacity: 0.7;
    margin-bottom: 0.4rem;
  }
  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.1em;
    line-height: 1;
  }
  .header-sub {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 0.5rem;
  }

  /* ── MAIN CARD ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.1s ease both;
    transition: border-color 0.5s, box-shadow 0.5s;
  }
  .card.led-on {
    border-color: var(--on-mid);
    box-shadow: 0 0 60px rgba(0,229,255,0.1), 0 0 120px rgba(0,229,255,0.05);
  }

  /* top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--on), transparent);
    opacity: 0;
    transition: opacity 0.5s;
  }
  .card.led-on::before { opacity: 1; }

  /* corner brackets */
  .card::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid transparent;
    border-radius: 14px;
    background:
      linear-gradient(var(--panel), var(--panel)) padding-box,
      linear-gradient(135deg, var(--border) 0%, transparent 50%, var(--border) 100%) border-box;
    pointer-events: none;
    transition: background 0.5s;
  }

  /* ── LED BULB ── */
  .bulb-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .bulb-ring {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.5s, box-shadow 0.5s;
    position: relative;
  }
  .led-on .bulb-ring {
    border-color: var(--on-mid);
    box-shadow:
      0 0 20px rgba(0,229,255,0.3),
      0 0 60px rgba(0,229,255,0.15),
      inset 0 0 30px rgba(0,229,255,0.05);
  }

  /* rotating dashes ring */
  .bulb-ring::before {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px dashed var(--border);
    transition: border-color 0.5s;
    animation: spin 20s linear infinite;
  }
  .led-on .bulb-ring::before { border-color: var(--on-mid); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bulb {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #1a2a35, #07111a);
    border: 2px solid #1a2d45;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
    position: relative;
    overflow: hidden;
  }
  .led-on .bulb {
    background: radial-gradient(circle at 38% 32%, #afffff, #00e5ff, #006b80);
    border-color: var(--on);
    box-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.4);
  }

  /* glint */
  .bulb::after {
    content: '';
    position: absolute;
    top: 12%; left: 18%; width: 30%; height: 18%;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    filter: blur(3px);
    opacity: 0;
    transition: opacity 0.5s;
  }
  .led-on .bulb::after { opacity: 1; }

  .bulb-icon {
    width: 36px; height: 36px;
    transition: all 0.5s;
  }
  .bulb-icon path, .bulb-icon circle { transition: all 0.5s; }
  .led-on .bulb-icon .bulb-fill { fill: rgba(255,255,255,0.9); }
  .led-on .bulb-icon .bulb-base { fill: rgba(255,255,255,0.7); }

  /* ── STATUS TEXT ── */
  .status-label {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--muted);
    transition: all 0.4s;
    margin-bottom: 0.3rem;
  }
  .led-on .status-label {
    color: var(--on);
    text-shadow: 0 0 20px rgba(0,229,255,0.6);
  }

  .status-sub {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 2rem;
    transition: color 0.4s;
    min-height: 1rem;
  }
  .led-on .status-sub { color: rgba(0,229,255,0.6); }

  /* ── BIG TOGGLE BUTTON ── */
  .toggle-btn {
    width: 100%;
    padding: 1rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
    position: relative;
    overflow: hidden;
  }
  .toggle-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--on-dim);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
  }
  .toggle-btn:hover { border-color: var(--on); color: var(--on); transform: translateY(-2px); }
  .toggle-btn:hover::before { transform: scaleX(1); }
  .toggle-btn:active { transform: translateY(0) scale(0.98); }

  .toggle-btn.is-on {
    border-color: var(--on);
    color: var(--white);
    background: var(--on-dim);
    box-shadow: 0 0 20px rgba(0,229,255,0.2), inset 0 1px 0 rgba(0,229,255,0.2);
  }
  .toggle-btn.is-on::before { transform: scaleX(1); }
  .toggle-btn span { position: relative; z-index: 1; }

  /* ── STATUS ROW BELOW CARD ── */
  .status-row {
    display: flex;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .stat-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }
  .stat-key {
    font-size: 0.52rem;
    letter-spacing: 0.2em;
    color: var(--muted);
  }
  .stat-val {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text);
    transition: color 0.3s;
  }
  .stat-val.ok   { color: var(--on); }
  .stat-val.err  { color: var(--danger); }
  .stat-val.dim  { color: var(--muted); }

  /* ── CONNECTION DOT ── */
  .conn-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 0.4rem;
    vertical-align: middle;
    transition: all 0.3s;
  }
  .conn-dot.on  { background: var(--on); box-shadow: 0 0 6px var(--on); animation: blink-dot 2s ease-in-out infinite; }
  .conn-dot.err { background: var(--danger); }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── CONFIG LINK ── */
  .config-row {
    animation: fadeUp 0.6s 0.3s ease both;
    display: flex; gap: 0.75rem;
  }
  .cfg-link {
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    cursor: pointer;
    background: none; border: none;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    transition: all 0.2s;
    text-decoration: none;
  }
  .cfg-link:hover { color: var(--on); background: var(--on-dim); }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 90%; max-width: 380px;
    position: relative;
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.1em; color: var(--white);
    margin-bottom: 1.5rem;
  }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 0.55rem; letter-spacing: 0.2em;
    color: var(--muted); margin-bottom: 0.4rem;
  }
  .field input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--on); }
  .field input::placeholder { color: var(--muted); }

  .modal-btns { display: flex; gap: 0.6rem; margin-top: 1.5rem; }
  .btn-cancel {
    flex: 1; padding: 0.65rem;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--text); }
  .btn-save {
    flex: 2; padding: 0.65rem;
    background: var(--on-dim); border: 1px solid var(--on);
    border-radius: 8px; color: var(--on);
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .btn-save:hover { background: rgba(0,229,255,0.2); }

  /* ── LOG STRIP ── */
  .log-strip {
    width: 100%; max-width: 400px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem 0.75rem;
    font-size: 0.58rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    min-height: 1.6rem;
    animation: fadeUp 0.6s 0.35s ease both;
    transition: color 0.3s;
  }
  .log-strip.ok  { color: rgba(0,229,255,0.7); }
  .log-strip.err { color: var(--danger); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SENDING SPINNER ── */
  .sending {
    display: inline-block;
    width: 10px; height: 10px;
    border: 2px solid var(--on-mid);
    border-top-color: var(--on);
    border-radius: 50%;
    animation: spin2 0.6s linear infinite;
    vertical-align: middle; margin-right: 0.4rem;
  }
  @keyframes spin2 { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">GPIO2 · BUILT-IN LED</div>
    <div class="header-title">ESP32 CTRL</div>
    <div class="header-sub">SUPABASE · REALTIME AUTO-SYNC</div>
  </div>

  <!-- MAIN CARD -->
  <div class="card" id="card">

    <!-- LED BULB -->
    <div class="bulb-wrap">
      <div class="bulb-ring">
        <div class="bulb" id="bulb">
          <!-- lightbulb SVG icon -->
          <svg class="bulb-icon" viewBox="0 0 36 36" fill="none">
            <path class="bulb-fill" d="M18 4C12.477 4 8 8.477 8 14c0 3.75 2.01 7.02 5 8.77V26h10v-3.23C25.99 21.02 28 17.75 28 14c0-5.523-4.477-10-10-10z" fill="#1a2d45"/>
            <rect class="bulb-base" x="13" y="27" width="10" height="2" rx="1" fill="#1a2d45"/>
            <rect class="bulb-base" x="14" y="30" width="8"  height="2" rx="1" fill="#1a2d45"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status-label" id="status-label">OFF</div>
    <div class="status-sub"   id="status-sub">LED is off · press button to turn on</div>

    <!-- TOGGLE BUTTON -->
    <button class="toggle-btn" id="toggle-btn" onclick="toggleLED()">
      <span id="btn-text">⏻ &nbsp; TURN ON</span>
    </button>

  </div>

  <!-- STATS ROW -->
  <div class="status-row">
    <div class="stat-box">
      <div class="stat-key">CONNECTION</div>
      <div class="stat-val dim" id="conn-val">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-text">OFFLINE</span>
      </div>
    </div>
    <div class="stat-box">
      <div class="stat-key">LAST UPDATE</div>
      <div class="stat-val dim" id="sync-val">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-key">COMMANDS</div>
      <div class="stat-val dim" id="cmd-val">0</div>
    </div>
  </div>

  <!-- LOG STRIP -->
  <div class="log-strip" id="log">Ready · configure Supabase to connect</div>

  <!-- CONFIG / LINKS -->
  <div class="config-row">
    <button class="cfg-link" onclick="openCfg()">⚙ CONFIG</button>
  </div>

</div>

<!-- CONFIG MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">⚙ Supabase Config</div>
    <div class="field">
      <label>Project URL</label>
      <input id="c-url" type="text" placeholder="https://xxxx.supabase.co">
    </div>
    <div class="field">
      <label>Anon Key</label>
      <input id="c-key" type="password" placeholder="eyJhbGci...">
    </div>
    <div class="field">
      <label>Table Name</label>
      <input id="c-table" type="text" placeholder="led_control">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeCfg()">Cancel</button>
      <button class="btn-save"   onclick="saveCfg()">Save &amp; Connect</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  PASTE YOUR CREDENTIALS HERE (optional)
//  Or use the ⚙ CONFIG button at runtime
// ══════════════════════════════════════════════
const DEFAULT_URL   = "https://kjfumdyatvvthmbzrhvm.supabase.co";
const DEFAULT_KEY   = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZnVtZHlhdHZ2dGhtYnpyaHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDE4ODksImV4cCI6MjA5MDM3Nzg4OX0.yVpYIQgYEm1W2W2pzsY5vphnACShkJA_mBRJK2soAPc";
const DEFAULT_TABLE = "led_control";
// ══════════════════════════════════════════════

let sb        = null;
let ledOn     = false;
let cmdCount  = 0;
let isSending = false;

// ── DOM refs ──────────────────────────────────
const card        = document.getElementById('card');
const bulb        = document.getElementById('bulb');
const statusLabel = document.getElementById('status-label');
const statusSub   = document.getElementById('status-sub');
const toggleBtn   = document.getElementById('toggle-btn');
const btnText     = document.getElementById('btn-text');
const connDot     = document.getElementById('conn-dot');
const connText    = document.getElementById('conn-text');
const connVal     = document.getElementById('conn-val');
const syncVal     = document.getElementById('sync-val');
const cmdVal      = document.getElementById('cmd-val');
const logEl       = document.getElementById('log');
const overlay     = document.getElementById('overlay');

// ── Init ──────────────────────────────────────
window.addEventListener('load', () => {
  const url   = localStorage.getItem('sb_url')   || DEFAULT_URL;
  const key   = localStorage.getItem('sb_key')   || DEFAULT_KEY;
  const table = localStorage.getItem('sb_table') || DEFAULT_TABLE;
  document.getElementById('c-url').value   = url;
  document.getElementById('c-key').value   = key;
  document.getElementById('c-table').value = table;
  if (url && key) connect(url, key);
});

// ── Connect to Supabase ───────────────────────
let realtimeChannel = null;

function connect(url, key) {
  try {
    sb = window.supabase.createClient(url, key);
    setConn(true);
    setLog('Connected · listening for changes...', 'ok');
    fetchState();      // get current state immediately on connect
    subscribeRealtime(); // then watch for live changes
  } catch(e) {
    setConn(false);
    setLog('Connection failed: ' + e.message, 'err');
  }
}

// ── Fetch current LED state from Supabase ─────
async function fetchState() {
  if (!sb) return;
  const table = getTable();
  try {
    const { data, error } = await sb.from(table).select('led_on').eq('id', 1).single();
    if (error) throw error;
    ledOn = data.led_on;
    render();
    syncVal.textContent = new Date().toLocaleTimeString();
    syncVal.className   = 'stat-val ok';
  } catch(e) {
    setLog('Fetch error: ' + e.message, 'err');
  }
}

// ── Supabase Realtime — fires instantly when DB row changes ──
// No polling needed. ESP32 writes to Supabase → dashboard updates immediately.
function subscribeRealtime() {
  if (!sb) return;

  // Remove old channel if reconnecting
  if (realtimeChannel) {
    sb.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }

  const table = getTable();

  realtimeChannel = sb
    .channel('led-control-changes')
    .on(
      'postgres_changes',
      {
        event:  'UPDATE',          // fire on any UPDATE to the row
        schema: 'public',
        table:  table,
        filter: 'id=eq.1'         // only watch row id=1
      },
      (payload) => {
        // payload.new contains the updated row
        const newLedOn = payload.new.led_on;
        if (newLedOn !== ledOn) {
          ledOn = newLedOn;
          render();
          cmdCount++;
          cmdVal.textContent  = cmdCount;
          cmdVal.className    = 'stat-val ok';
          syncVal.textContent = new Date().toLocaleTimeString();
          syncVal.className   = 'stat-val ok';
          setLog((ledOn ? '▶ ESP32 → LED ON' : '■ ESP32 → LED OFF') + ' · auto-synced', 'ok');
        }
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        setLog('Realtime active · dashboard auto-updates instantly', 'ok');
      } else if (status === 'CHANNEL_ERROR') {
        setLog('Realtime error — retrying...', 'err');
        // Retry after 3s
        setTimeout(subscribeRealtime, 3000);
      }
    });
}

// ── Toggle LED ────────────────────────────────
async function toggleLED() {
  if (!sb)        { setLog('Not connected — use ⚙ CONFIG first', 'err'); return; }
  if (isSending)  { return; }

  isSending = true;
  ledOn = !ledOn;   // optimistic update — show change instantly
  render();
  setSending(true);

  try {
    const table = getTable();
    const { error } = await sb.from(table).upsert([{
      id:         1,
      led_on:     ledOn,
      blink:      false,     // always false — no accidental blink
      speed_ms:   500,
      updated_at: new Date().toISOString()
    }]);
    if (error) throw error;

    cmdCount++;
    cmdVal.textContent = cmdCount;
    cmdVal.className = 'stat-val ok';
    syncVal.textContent = new Date().toLocaleTimeString();
    syncVal.className = 'stat-val ok';
    setLog((ledOn ? '✔ LED turned ON' : '✔ LED turned OFF') + ' · synced to Supabase', 'ok');

  } catch(e) {
    // Rollback on failure
    ledOn = !ledOn;
    render();
    setLog('Sync failed: ' + e.message, 'err');
  } finally {
    isSending = false;
    setSending(false);
  }
}

// ── Render UI to match ledOn state ───────────
function render() {
  card.classList.toggle('led-on', ledOn);

  statusLabel.textContent = ledOn ? 'ON' : 'OFF';
  statusSub.textContent   = ledOn
    ? 'LED is ON · solid, no blinking'
    : 'LED is off · press button to turn on';

  toggleBtn.classList.toggle('is-on', ledOn);
  btnText.innerHTML = ledOn
    ? '⏻ &nbsp; TURN OFF'
    : '⏻ &nbsp; TURN ON';
}

// ── Sending state ────────────────────────────
function setSending(v) {
  if (v) {
    btnText.innerHTML = '<span class="sending"></span> SYNCING...';
    toggleBtn.disabled = true;
  } else {
    toggleBtn.disabled = false;
    render();
  }
}

// ── Helpers ───────────────────────────────────
function setConn(online) {
  connDot.className  = 'conn-dot ' + (online ? 'on' : 'err');
  connText.textContent = online ? 'ONLINE' : 'OFFLINE';
  connVal.className  = 'stat-val ' + (online ? 'ok' : 'err');
}

function setLog(msg, type) {
  logEl.textContent = msg;
  logEl.className   = 'log-strip ' + (type || '');
}

function getTable() {
  return localStorage.getItem('sb_table') || DEFAULT_TABLE;
}

// ── Config modal ──────────────────────────────
function openCfg() { overlay.classList.add('open'); }
function closeCfg() { overlay.classList.remove('open'); }

function saveCfg() {
  const url   = document.getElementById('c-url').value.trim();
  const key   = document.getElementById('c-key').value.trim();
  const table = document.getElementById('c-table').value.trim() || 'led_control';
  if (!url || !key) { setLog('URL and Key required', 'err'); return; }
  localStorage.setItem('sb_url',   url);
  localStorage.setItem('sb_key',   key);
  localStorage.setItem('sb_table', table);
  closeCfg();
  connect(url, key);  // reconnects + re-subscribes realtime
}

// close modal on backdrop click
overlay.addEventListener('click', e => {
  if (e.target === overlay) closeCfg();
});
</script>
</body>
</html>
